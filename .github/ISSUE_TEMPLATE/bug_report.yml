name: Bug report
description: Report a problem with JeepMe
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS / browser / device (if relevant)
    validations:
      required: false
